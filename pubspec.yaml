name: cherry_mvp
description: Cherry MVP
version: 0.0.1

environment:
  sdk: '^3.8.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  firebase_storage: ^13.1.0
  cloud_firestore: ^6.1.3
  cloud_functions: ^6.0.7
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.5.5
  provider: ^6.1.5+1
  fluttertoast: ^9.0.0
  logging: ^1.3.0
  image_picker: ^1.2.1
  flutter_dotenv: ^6.0.0
  google_sign_in: ^6.2.2
  fl_chart: ^1.2.0
  google_fonts: ^8.0.2
  mask_text_input_formatter: ^2.9.0
  flutter_svg: ^2.2.4
  dio: ^5.9.2
  pretty_dio_logger: ^1.4.0
  json_annotation: ^4.11.0
  http: ^1.6.0
  flutter_stripe: ^12.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  mockito: ^5.6.3
  flutter_lints: ^6.0.0
  json_serializable: ^6.13.1
  build_runner: ^2.13.1
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

dependency_overrides:

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/fonts/
    - .env

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the assets and other descriptors for the font. For
  # example:
  fonts:
    - family: Raleway
      fonts:
        - asset: assets/fonts/Raleway-Light.ttf
          weight: 300
        - asset: assets/fonts/Raleway-Thin.ttf
          weight: 300
        - asset: assets/fonts/Raleway-Regular.ttf
          weight: 400
        - asset: assets/fonts/Raleway-Medium.ttf
          weight: 500
        - asset: assets/fonts/Raleway-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Raleway-Bold.ttf
          weight: 700
        - asset: assets/fonts/Raleway-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Raleway-Black.ttf
          weight: 900
        - asset: assets/fonts/Raleway-BlackItalic.ttf
          style: italic
        - asset: assets/fonts/Raleway-MediumItalic.ttf
          weight: 500
          style: italic
        - asset: assets/fonts/Raleway-BlackItalic.ttf
          weight: 900
          style: italic

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  remove_alpha_ios: true
  min_sdk_android: 21

flutter_native_splash:
  color: "#FFFFFF"
  image: assets/icon/icon.png
  android: true
  ios: true
  android_12:
    image: assets/icon/icon.png
    icon_background_color: "#FFFFFF"
